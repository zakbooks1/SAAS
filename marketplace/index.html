<!DOCTYPE html>
<html>
<head>
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="background:#0a0f1c;color:white;font-family:system-ui;padding:20px">

<h1>🛒 Marketplace</h1>

<div id="games"></div>

<script>
const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

async function load(){
  const { data } = await supabaseClient.from("games").select("*");

  document.getElementById("games").innerHTML =
    data.sort((a,b)=>(b.likes||0)-(a.likes||0))
    .map(g => `
      <div style="padding:10px;margin:10px;background:#111827;border-radius:10px">
        <b>${g.id}</b> ❤️ ${g.likes||0}
        <button onclick="play('${g.id}')">Play</button>
      </div>
    `).join("");
}

async function play(id){
  const { data } = await supabaseClient
    .from("games")
    .select("*")
    .eq("id", id)
    .single();

  window.parent.openGame(data.code);
}

load();
</script>

</body>
</html>
