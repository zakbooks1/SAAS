<!DOCTYPE html>
<html>
<head>
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="background:#0a0f1c;color:white;font-family:system-ui;margin:0;padding:20px">

<h1>Marketplace</h1>

<div id="games"></div>

<script>
const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

async function load(){
  const {data}=await supabaseClient.from("games").select("*");

  document.getElementById("games").innerHTML=
    data.map(g=>`
      <div style="padding:10px;background:#111827;margin:10px;border-radius:10px">
        ${g.id}
        <button onclick="location.href='/play.html?id=${g.id}'">Play</button>
      </div>
    `).join("");
}

load();
</script>

</body>
</html>
