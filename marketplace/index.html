<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="background:#0b0b0f;color:white">

<button onclick="location.href='/'">🏠 Home</button>

<h1>Marketplace</h1>
<div id="games"></div>

<script>
const supabaseClient = supabase.createClient("https://kruimxsgvsuguhwsqvlh.supabase.co","sb_publishable_MkNjCO_f8HsHyMwzsMRzng_8mn0-1kd");

async function load() {
  const { data } = await supabaseClient.from("games").select("*");

  const div = document.getElementById("games");

  data.forEach(g => {
    div.innerHTML += `
      <div>
        ${g.id}
        <button onclick="play('${g.id}')">Play</button>
      </div>
    `;
  });
}

function play(id){
  location.href="/play.html?id="+id;
}

load();
</script>

</body>
</html>
