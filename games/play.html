<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="margin:0;background:black">

<div id="game"></div>

<script>
const supabaseClient = supabase.createClient("https://kruimxsgvsuguhwsqvlh.supabase.co","sb_publishable_MkNjCO_f8HsHyMwzsMRzng_8mn0-1kd");

const id = new URLSearchParams(location.search).get("id");

async function loadGame() {
  const { data } = await supabaseClient
    .from("games")
    .select("*")
    .eq("id", id)
    .single();

  document.getElementById("game").innerHTML = data.code;
}

loadGame();
</script>

</body>
</html>
