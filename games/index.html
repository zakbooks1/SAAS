<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { margin:0; font-family:system-ui; background:#0b0b0f; color:white; }
    .top { padding:10px; background:#111; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,200px); gap:10px; padding:20px; }
    .card { background:#161620; padding:10px; border-radius:12px; }
    textarea { width:90%; height:120px; }
  </style>
</head>

<body>

<div class="top">
  <button onclick="location.href='/'">🏠 Home</button>
</div>

<h2>Upload Game</h2>
<textarea id="code"></textarea>
<br>
<button onclick="uploadGame()">Upload</button>

<h2>Your Games</h2>
<div id="list" class="grid"></div>

<script>
const supabaseClient = supabase.createClient(
  "YOUR_URL",
  "YOUR_KEY"
);

let currentUser = null;

async function checkUser() {
  const { data } = await supabaseClient.auth.getUser();
  currentUser = data.user;
  if (currentUser) loadGames();
}

async function uploadGame() {
  if (!currentUser) return alert("Login first");

  const code = document.getElementById("code").value;
  if (!code) return alert("No code");

  const id = Math.random().toString(36).substring(2,9);

  const { error } = await supabaseClient.from("games").insert([{
    id,
    code,
    user_id: currentUser.id
  }]);

  if (error) return alert(error.message);

  alert("Uploaded!");
  loadGames();
}

async function loadGames() {
  const { data } = await supabaseClient
    .from("games")
    .select("*")
    .eq("user_id", currentUser.id);

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(g => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <p>${g.id}</p>
      <button onclick="play('${g.id}')">Play</button>
    `;
    list.appendChild(div);
  });
}

function play(id) {
  location.href = "/play.html?id=" + id;
}

checkUser();
</script>

</body>
</html>
