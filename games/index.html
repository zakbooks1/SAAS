<!DOCTYPE html>
<html>
<head>
  <title>Games</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    textarea {
      width: 90%;
      height: 120px;
      margin-top: 10px;
    }

    .card {
      background: #222;
      padding: 15px;
      margin: 10px auto;
      width: 320px;
      border-radius: 10px;
    }

    button {
      padding: 8px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎮 Games</h1>

<!-- AUTH UI -->
<div class="card">
  <h3>Account</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <br>

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Login</button>
  <button onclick="logout()">Logout</button>

  <p id="status">Not logged in</p>
</div>

<!-- UPLOAD -->
<div class="card">
  <h3>Upload Game</h3>
  <textarea id="code" placeholder="Paste HTML game here"></textarea>
  <br>
  <button onclick="uploadGame()">Upload</button>
</div>

<!-- GAME LIST -->
<h2>Your Games</h2>
<div id="list"></div>

<script>
const supabaseClient = supabase.createClient(
  "https://kruimxsgvsuguhwsqvlh.supabase.co",
  "sb_publishable_MkNjCO_f8HsHyMwzsMRzng_8mn0-1kd"
);

let currentUser = null;

/* ================= AUTH ================= */

// SIGN UP
async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) alert(error.message);
  else alert("Account created! Check email if required.");
}

// LOGIN
async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    currentUser = data.user;
    updateUI();
    loadGames();
  }
}

// LOGOUT
async function logout() {
  await supabaseClient.auth.signOut();
  currentUser = null;
  updateUI();
  document.getElementById("list").innerHTML = "";
}

// CHECK USER ON LOAD
async function checkUser() {
  const { data } = await supabaseClient.auth.getUser();
  currentUser = data.user;
  updateUI();

  if (currentUser) loadGames();
}

// UPDATE UI
function updateUI() {
  document.getElementById("status").innerText =
    currentUser
      ? "Logged in: " + currentUser.email
      : "Not logged in";
}

/* ================= GAMES ================= */

// UPLOAD GAME
async function uploadGame() {
  if (!currentUser) {
    alert("Login first!");
    return;
  }

  const code = document.getElementById("code").value;
  if (!code) return alert("No code!");

  const id = Math.random().toString(36).substring(2, 10);

  const { error } = await supabaseClient.from("games").insert([{
    id,
    code,
    user_id: currentUser.id
  }]);

  if (error) {
    alert("Upload failed");
    return;
  }

  alert("Game uploaded!");
  loadGames();
}

// LOAD USER GAMES
async function loadGames() {
  if (!currentUser) return;

  const { data } = await supabaseClient
    .from("games")
    .select("*")
    .eq("user_id", currentUser.id);

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(g => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <p><b>${g.id}</b></p>
      <button onclick="play('${g.id}')">Play</button>
    `;

    list.appendChild(div);
  });
}

// PLAY GAME
function play(id) {
  window.location.href = "/play.html?id=" + id;
}

/* ================= INIT ================= */

checkUser();
</script>

</body>
</html>
