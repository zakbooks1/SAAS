<!DOCTYPE html>
<html>
<head>
  <title>Games</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .card {
      background: #222;
      padding: 15px;
      margin: 10px auto;
      width: 320px;
      border-radius: 10px;
    }

    textarea {
      width: 90%;
      height: 120px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🎮 Games</h1>

  <div class="card">
    <h3>Upload Game (HTML)</h3>

    <textarea id="code" placeholder="Paste HTML game here"></textarea>
    <br>
    <button onclick="uploadGame()">Upload</button>
  </div>

  <h2>My Games</h2>
  <div id="list"></div>

  <br>
  <a href="/">⬅ Home</a>

<script>
function uploadGame() {
  const code = document.getElementById("code").value;
  if (!code) return alert("No code!");

  let games = JSON.parse(localStorage.getItem("games") || "[]");

  const id = Math.random().toString(36).substring(2, 10);

  games.push({
    id,
    code
  });

  localStorage.setItem("games", JSON.stringify(games));

  loadGames();
}

function loadGames() {
  let games = JSON.parse(localStorage.getItem("games") || "[]");

  const list = document.getElementById("list");
  list.innerHTML = "";

  games.forEach(g => {
    const link = `${location.origin}/play.html?id=${g.id}`;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <p><b>Game:</b> ${g.id}</p>
      <button onclick="play('${g.id}')">Play</button>
      <button onclick="copyLink('${link}')">Copy Link</button>
    `;

    list.appendChild(div);
  });
}

function play(id) {
  window.location.href = "/play.html?id=" + id;
}

function copyLink(link) {
  navigator.clipboard.writeText(link);
  alert("Link copied!");
}

loadGames();
</script>

</body>
</html>
