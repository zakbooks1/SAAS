<!DOCTYPE html>
<html>
<head>
  <title>Games</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    textarea {
      width: 90%;
      height: 120px;
    }

    .card {
      background: #222;
      padding: 15px;
      margin: 10px auto;
      width: 320px;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎮 Games</h1>

  <div id="auth">
  <h3>Account</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <br><br>

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Login</button>
  <button onclick="logout()">Logout</button>

  <p id="status">Not logged in</p>
</div>

<textarea id="code" placeholder="Paste HTML game here"></textarea>
<br>
<button onclick="uploadGame()">Upload Game</button>

<h2>Cloud Games</h2>
<div id="list"></div>

<script>
const supabase = supabase.createClient(
  "https://kruimxsgvsuguhwsqvlh.supabase.co",
  "sb_publishable_MkNjCO_f8HsHyMwzsMRzng_8mn0-1kd"
);

// Upload game
async function uploadGame() {
  const code = document.getElementById("code").value;
  if (!code) return alert("No code!");

  const id = Math.random().toString(36).substring(2, 10);

  const { error } = await supabase
    .from("games")
    .insert([{ id, code }]);

  if (error) return alert("Upload failed");

  alert("Uploaded!");
  loadGames();
}

// Load games
async function loadGames() {
  const { data } = await supabase
    .from("games")
    .select("*");

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(g => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <p><b>${g.id}</b></p>
      <button onclick="play('${g.id}')">Play</button>
    `;

    list.appendChild(div);
  });
}

// Play game
function play(id) {
  window.location.href = "/play.html?id=" + id;
}

loadGames();
</script>

</body>
</html>
