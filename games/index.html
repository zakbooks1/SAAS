<!DOCTYPE html>
<html>
<head>
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { margin:0; font-family:system-ui; background:#0a0f1c; color:#e5e7eb; display:flex; }

.sidebar { width:220px; background:#0f172a; padding:20px; height:100vh; border-right:1px solid #1f2937; }

.navbtn { display:block; width:100%; margin:8px 0; padding:12px; border:1px solid #1f2937; background:transparent; color:white; border-radius:10px; font-weight:700; }

.main { flex:1; padding:20px; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,200px); gap:12px; }

.card { background:#111827; padding:12px; border-radius:14px; border:1px solid #1f2937; }

button { padding:10px; border:none; border-radius:10px; cursor:pointer; font-weight:700; }

.primary { background:#3b82f6; color:#0b1220; }
textarea { width:100%; height:120px; background:#0b1220; color:white; border:1px solid #1f2937; border-radius:10px; }
</style>
</head>

<body>

<div class="sidebar">
  <button class="navbtn" onclick="location.href='/'">🏠 Home</button>
  <button class="navbtn" onclick="location.href='/marketplace/index.html'">🛒 Marketplace</button>
</div>

<div class="main">

<h2>Upload Game</h2>
<textarea id="code"></textarea>
<button class="primary" onclick="upload()">Upload</button>

<h2>Your Games</h2>
<div id="list" class="grid"></div>

</div>

<script>
const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

let user=null;

async function init(){
  const {data}=await supabaseClient.auth.getUser();
  user=data.user;
  load();
}

async function upload(){
  if(!user) return alert("login");

  const code=document.getElementById("code").value;
  const id=Math.random().toString(36).slice(2,9);

  await supabaseClient.from("games").insert([{id,code,user_id:user.id}]);

  load();
}

async function load(){
  const {data}=await supabaseClient.from("games").select("*").eq("user_id",user.id);

  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(g=>{
    list.innerHTML+=`
      <div class="card">
        <p>${g.id}</p>
        <button onclick="location.href='/play.html?id=${g.id}'">Play</button>
      </div>
    `;
  });
}

init();
</script>

</body>
</html>
