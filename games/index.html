<!DOCTYPE html>
<html>
<head>
  <title>Games</title>

  <script src="/app-shell.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0f1c;
  color:white;
}

.card{
  background:#111827;
  border:1px solid #1f2937;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

button{
  padding:8px 10px;
  border-radius:8px;
  border:none;
  background:#3b82f6;
  cursor:pointer;
}
  </style>
</head>

<body>

<script>
createShell("Games");
const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
</script>

<textarea id="code" placeholder="paste game html"></textarea>
<button onclick="upload()">Upload Game</button>

<div id="list"></div>

<!-- MODAL -->
<div id="gameModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;">
  <div style="width:90%;height:90%;background:#0b1220;margin:auto;position:relative;border-radius:12px;">
    <button onclick="closeGame()" style="position:absolute;right:10px;top:10px;">✖</button>
    <div id="gameFrame" style="width:100%;height:100%;"></div>
  </div>
</div>

<script>
async function upload(){
  const { data: user } = await supabaseClient.auth.getUser();
  const id = Math.random().toString(36).slice(2,9);

  await supabaseClient.from("games").insert([{
    id,
    code: document.getElementById("code").value,
    user_id: user.user.id,
    likes: 0
  }]);

  load();
}

async function load(){
  const { data } = await supabaseClient.from("games").select("*");

  document.getElementById("list").innerHTML =
    data.map(g => `
      <div class="card">
        <b>${g.id}</b>
        <button onclick="play('${g.id}')">Play</button>
      </div>
    `).join("");
}

async function play(id){
  const { data } = await supabaseClient.from("games").select("*").eq("id",id).single();

  document.getElementById("gameModal").style.display="block";
  document.getElementById("gameFrame").innerHTML =
    `<iframe srcdoc="${data.code}" style="width:100%;height:100%;border:none;"></iframe>`;
}

function closeGame(){
  document.getElementById("gameModal").style.display="none";
}

load();
</script>

</body>
</html>
