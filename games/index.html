<!DOCTYPE html>
<html>
<head>
  <title>Games</title>
  <p style="opacity:0.7">
  Build • Share • Play Games
</p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
  body {
    font-family: system-ui, Arial;
    background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
    color: #fff;
    margin: 0;
    padding: 20px;
  }

  h1 {
    font-size: 34px;
    margin-bottom: 5px;
  }

  h2 {
    margin-top: 40px;
    opacity: 0.9;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding: 16px;
    margin: 12px auto;
    width: 360px;
    border-radius: 14px;
    transition: 0.2s;
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.2);
  }

  input, textarea {
    width: 90%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
  }

  textarea {
    height: 120px;
  }

  button {
    padding: 10px 14px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.05);
  }

  .primary { background: #4CAF50; color: white; }
  .secondary { background: #2196F3; color: white; }
  .danger { background: #ff4d4d; color: white; }

  #status {
    font-size: 13px;
    opacity: 0.7;
  }

  .section {
    margin-top: 30px;
  }

  .grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }
</style>
</head>

<body>

<h1>🎮 Game Platform</h1>

<!-- ACCOUNT -->
<div class="card">
  <h3>Account</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <br>

  <button class="primary" onclick="signUp()">Sign Up</button>
  <button class="secondary" onclick="signIn()">Login</button>
  <button class="danger" onclick="logout()">Logout</button>

  <p id="status">Not logged in</p>
</div>

<!-- UPLOAD -->
<div class="card">
  <h3>Upload Game</h3>
  <textarea id="code" placeholder="Paste HTML game here"></textarea>
  <br>
  <button class="primary" onclick="uploadGame()">Upload</button>
</div>

<!-- USER GAMES -->
<h2>👤 Your Games</h2>
<div id="list"></div>

<!-- PUBLIC GAMES -->
<h2>🌍 Public Games</h2>
<button class="secondary" onclick="loadAllGames()">Load Public Games</button>
<div id="allGames"></div>

<script>
const supabaseClient = supabase.createClient(
  "https://kruimxsgvsuguhwsqvlh.supabase.co",
  "sb_publishable_MkNjCO_f8HsHyMwzsMRzng_8mn0-1kd"
);

let currentUser = null;

/* ================= AUTH ================= */

async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({ email, password });

  if (error) alert(error.message);
  else alert("Account created! Check your email.");
}

async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email, password
  });

  if (error) alert(error.message);
  else {
    currentUser = data.user;
    updateUI();
    loadGames();
  }
}

async function logout() {
  await supabaseClient.auth.signOut();
  currentUser = null;
  updateUI();
  document.getElementById("list").innerHTML = "";
}

async function checkUser() {
  const { data } = await supabaseClient.auth.getUser();
  currentUser = data.user;
  updateUI();

  if (currentUser) loadGames();
}

function updateUI() {
  document.getElementById("status").innerText =
    currentUser
      ? "Logged in: " + currentUser.email
      : "Not logged in";
}

/* ================= GAMES ================= */

async function uploadGame() {
  if (!currentUser) return alert("Login first!");

  const code = document.getElementById("code").value;
  if (!code) return alert("No code!");

  const id = Math.random().toString(36).substring(2, 10);

  const { error } = await supabaseClient.from("games").insert([{
    id,
    code,
    user_id: currentUser.id
  }]);

  if (error) return alert("Upload failed");

  alert("Game uploaded!");
  loadGames();
}

async function loadGames() {
  if (!currentUser) return;

  const { data } = await supabaseClient
    .from("games")
    .select("*")
    .eq("user_id", currentUser.id);

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(g => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <p><b>${g.id}</b></p>
      <button onclick="play('${g.id}')">Play</button>
    `;

    list.appendChild(div);
  });
}

async function loadAllGames() {
  const { data } = await supabaseClient
    .from("games")
    .select("*");

  const list = document.getElementById("allGames");
  list.innerHTML = "";

  data.forEach(g => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <p><b>${g.id}</b></p>
      <button onclick="play('${g.id}')">Play</button>
    `;

    list.appendChild(div);
  });
}

function play(id) {
  window.location.href = "/play.html?id=" + id;
}

/* ================= INIT ================= */

checkUser();
</script>

</body>
</html>
