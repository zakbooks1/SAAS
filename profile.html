<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>

  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0f1c;
  color:white;
  padding:20px;
}

.card{
  background:#111827;
  border:1px solid #1f2937;
  padding:15px;
  border-radius:14px;
}
</style>
</head>

<body>

<h1>👤 Profile</h1>
<div id="user"></div>

<h2>Your Games</h2>
<div id="games"></div>

<script>
const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

async function load(){
  const {data:userData}=await supabaseClient.auth.getUser();
  const user=userData.user;

  if(!user) location.href="/auth.html";

  document.getElementById("user").innerHTML=user.email;

  const {data}=await supabaseClient.from("games").select("*").eq("user_id",user.id);

  document.getElementById("games").innerHTML=data.map(g=>
    `<div class="card">${g.id} ❤️ ${g.likes||0}</div>`
  ).join("");
}

load();
</script>

</body>
</html>
