<!DOCTYPE html>
<html>
<head>
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="margin:0;background:black;color:white;font-family:system-ui">

<div id="game"></div>

<script>
const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

const id=new URLSearchParams(location.search).get("id");

async function load(){
  const {data}=await supabaseClient.from("games").select("*").eq("id",id).single();
  document.getElementById("game").innerHTML=data.code;
}

load();
</script>

  <div id="gameModal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:9999;
">

  <div style="
    width:90%;
    height:90%;
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:12px;
    overflow:hidden;
    position:relative;
  ">

    <button onclick="closeGame()" style="
      position:absolute;
      top:10px;
      right:10px;
      padding:8px 12px;
      background:#3b82f6;
      border:none;
      border-radius:8px;
      font-weight:700;
      cursor:pointer;
    ">
      ✖ Close
    </button>

    <div id="gameFrame" style="width:100%;height:100%;"></div>

  </div>
</div>

</body>
</html>
