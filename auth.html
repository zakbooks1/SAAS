<!DOCTYPE html>
<html>
<head>
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="background:#0a0f1c;color:white;font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh">

<div style="background:#111827;padding:20px;border-radius:14px;width:300px">

<h2>Login</h2>

<input id="email" placeholder="email" style="width:100%;padding:10px;margin:5px">
<input id="password" type="password" placeholder="password" style="width:100%;padding:10px;margin:5px">

<button onclick="login()" style="width:100%;padding:10px;background:#3b82f6;border:none;color:white">Continue</button>

</div>

<script>
const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email, password
  });

  if(error) return alert(error.message);

  location.href = "/";
}
</script>

</body>
</html>
