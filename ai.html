<!DOCTYPE html>
<html>
<head>
  <title>AI Generator</title>

  <script src="/app-shell.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0f1c;
  color:white;
}

input,button{
  padding:10px;
  margin:10px;
}
  </style>
</head>

<body>

<script>
createShell("AI Generator");
const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
</script>

<input id="prompt" placeholder="describe game">
<button onclick="generate()">Generate</button>

<p id="status"></p>

<script>
async function generate(){
  const prompt = document.getElementById("prompt").value;

  const { data: user } = await supabaseClient.auth.getUser();

  const id = Math.random().toString(36).slice(2,9);

  const game = `
  <html>
  <body style="background:black;color:white;display:flex;align-items:center;justify-content:center;height:100vh">
    <h1>${prompt}</h1>
  </body>
  </html>`;

  await supabaseClient.from("games").insert([{
    id,
    code: game,
    user_id: user.user.id,
    likes:0
  }]);

  document.getElementById("status").innerText="Created!";
}
</script>

</body>
</html>
