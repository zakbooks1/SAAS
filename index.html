<!DOCTYPE html>
<html>
<head>
  <title>Your Platform</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 50px;
    }

    button {
      padding: 15px 25px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .games { background: #4CAF50; }
    .tools { background: #2196F3; }
  </style>
</head>

<body>

  <h1>My Platform</h1>
  <p>Games + Tools in one place</p>

  <button class="games" onclick="location.href='/games'">
    🎮 Games
  </button>

  <button class="tools" onclick="location.href='/tools'">
    🛠 Tools
  </button>

</body>
</html>
