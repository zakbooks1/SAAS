<!DOCTYPE html>
<html>
<head>
  <title>My Platform</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial;
      background: #0b0b0f;
      color: white;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #12121a;
      height: 100vh;
      padding: 20px;
      border-right: 1px solid #222;
    }

    .logo {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .navbtn {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #1b1b25;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      text-align: left;
    }

    .navbtn:hover {
      background: #2a2a3a;
    }

    /* MAIN AREA */
    .main {
      flex: 1;
      padding: 40px;
    }

    .card {
      background: #161620;
      padding: 20px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      max-width: 600px;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">🚀 My Platform</div>

    <button class="navbtn" onclick="location.href='/'">🏠 Home</button>
    <button class="navbtn" onclick="location.href='/games/index.html'">🎮 Games</button>
    <button class="navbtn" onclick="location.href='/tools/index.html'">🛠 Tools</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h1>Dashboard</h1>

    <div class="card">
      <h3>Welcome 👋</h3>
      <p>This is your platform dashboard.</p>
      <p>Use the sidebar to navigate.</p>
    </div>

  </div>

</body>
</html>
