<!DOCTYPE html>
<html>
<head>
  <title>Platform Home</title>

  <script src="/app-shell.js"></script>

  <style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0f1c;
  color:white;
  animation:fade .2s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(5px);}
  to{opacity:1;transform:translateY(0);}
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
  padding:20px;
}

.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:15px;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:scale(1.03);
  border-color:#3b82f6;
}
  </style>
</head>

<body>

<script>
createShell("Home");
</script>

<div class="grid">
  <div class="card" onclick="location.href='/games/index.html'">🎮 Games</div>
  <div class="card" onclick="location.href='/marketplace/index.html'">🛒 Marketplace</div>
  <div class="card" onclick="location.href='/tools/index.html'">🛠 Tools</div>
  <div class="card" onclick="location.href='/ai.html'">🧠 AI Generator</div>
</div>

</body>
</html>
