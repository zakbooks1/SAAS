<!DOCTYPE html>
<html>
<head>
  <title>Platform</title>

  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
:root {
  --bg:#0a0f1c;
  --side:#0f172a;
  --card:#111827;
  --border:#1f2937;
  --accent:#3b82f6;
  --text:#e5e7eb;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:var(--side);
  height:100vh;
  padding:20px;
  border-right:1px solid var(--border);
}

.navbtn {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:transparent;
  color:white;
  font-weight:700;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

/* MODAL */
#gameModal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#gameModalBox {
  width:90%;
  height:90%;
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  overflow:hidden;
  position:relative;
}

#gameFrame {
  width:100%;
  height:100%;
}

.closeBtn {
  position:absolute;
  top:10px;
  right:10px;
  background:#3b82f6;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}
  </style>
</head>

<body>

<div class="sidebar">
  <h3>🚀 Platform</h3>

  <button class="navbtn" onclick="location.href='/'">🏠 Home</button>
  <button class="navbtn" onclick="location.href='/games/index.html'">🎮 Games</button>
  <button class="navbtn" onclick="location.href='/marketplace/index.html'">🛒 Marketplace</button>
  <button class="navbtn" onclick="location.href='/auth.html'">🔐 Login</button>
  <button class="navbtn" onclick="location.href='/tools/tools.html'">🔐 tools</button>
</div>

<div class="main">
  <h1>Dashboard</h1>
  <p>Click games to play instantly (modal system).</p>
</div>

<!-- MODAL -->
<div id="gameModal">
  <div id="gameModalBox">
    <button class="closeBtn" onclick="closeGame()">✖ Close</button>
    <div id="gameFrame"></div>
  </div>
</div>

<script>
const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

function openGame(code) {
  document.getElementById("gameModal").style.display = "flex";
  document.getElementById("gameFrame").innerHTML = code;
}

function closeGame() {
  document.getElementById("gameModal").style.display = "none";
  document.getElementById("gameFrame").innerHTML = "";
}
</script>

</body>
</html>
