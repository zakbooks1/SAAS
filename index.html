<!DOCTYPE html>
<html>
<head>
  <title>Platform</title>

  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --bg:#0a0f1c;
  --side:#0f172a;
  --card:#111827;
  --border:#1f2937;
  --accent:#3b82f6;
  --text:#e5e7eb;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:var(--side);
  height:100vh;
  padding:20px;
  border-right:1px solid var(--border);
}

.navbtn{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:transparent;
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.navbtn:hover{
  background:var(--card);
  border-color:var(--accent);
  transform:translateX(6px);
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>🚀 Platform</h3>

  <button class="navbtn" onclick="location.href='/'">🏠 Home</button>
  <button class="navbtn" onclick="location.href='/games/index.html'">🎮 Games</button>
  <button class="navbtn" onclick="location.href='/marketplace/index.html'">🛒 Marketplace</button>
  <button class="navbtn" onclick="location.href='/tools/index.html'">🛠 Tools</button>
  <button class="navbtn" onclick="location.href='/ai.html'">🧠 AI Generator</button>
  <button class="navbtn" onclick="location.href='/auth.html'">🔐 Login</button>
</div>

<!-- MAIN -->
<div class="main">
  <h1>Dashboard</h1>
  <p>Platform running with tools + AI + marketplace.</p>
</div>

</body>
</html>
