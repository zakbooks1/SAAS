<!DOCTYPE html>
<html>
<head>
  <title>My Platform</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b0b0f;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #12121a;
      height: 100vh;
      padding: 20px;
      border-right: 1px solid #222;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #1b1b25;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      text-align: left;
    }

    .main {
      padding: 40px;
      flex: 1;
    }

    .card {
      background: #161620;
      padding: 20px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      max-width: 600px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>🚀 Platform</h3>

  <button class="btn" onclick="location.href='/'">🏠 Home</button>
  <button class="btn" onclick="location.href='/games/index.html'">🎮 Games</button>
  <button class="btn" onclick="location.href='/tools/index.html'">🛠 Tools</button>
</div>

<div class="main">
  <h1>Dashboard</h1>

  <div class="card">
    <h3>Welcome 👋</h3>
    <p>Your game + tools platform is running.</p>
  </div>
</div>

</body>
</html>
