<!DOCTYPE html>
<html>
<head>
  <title>Tools</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial;
      background: #0b0b0f;
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0 0 20px 0;
    }

    .card {
      background: #161620;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 15px;
      max-width: 700px;
      margin: 0 auto 15px auto;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 8px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1b1b25;
      color: white;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary { background: #4CAF50; color: white; }
    .secondary { background: #2196F3; color: white; }

    a {
      color: #aaa;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🛠 Tools</h1>

<!-- EMBED CONVERTER -->
<div class="card">
  <h3>🧠 Embed → HTML Game Converter</h3>

  <textarea id="embedInput" placeholder="Paste embed code here..."></textarea>

  <button class="primary" onclick="convertEmbed()">Convert</button>

  <textarea id="outputHTML" placeholder="Generated HTML will appear here..."></textarea>

  <button class="secondary" onclick="copyOutput()">Copy</button>
</div>

<a href="/">⬅ Back Home</a>

<script>
function convertEmbed() {
  const embed = document.getElementById("embedInput").value;

  const html = `
<!DOCTYPE html>
<html>
<head>
  <title>Game</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div>
    ${embed}
  </div>
</body>
</html>
`;

  document.getElementById("outputHTML").value = html;
}

function copyOutput() {
  const out = document.getElementById("outputHTML");
  out.select();
  document.execCommand("copy");
  alert("Copied!");
}
</script>

</body>
</html>
