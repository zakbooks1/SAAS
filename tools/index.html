<!DOCTYPE html>
<html>
<head>
  <title>Tools</title>
  <style>
    body {
      font-family: Arial;
      background: #0d0d0d;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .tool {
      background: #1e1e1e;
      padding: 20px;
      margin: 10px auto;
      width: 320px;
      border-radius: 10px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  
  <div class="card">
  <h3>🧠 Embed → HTML Game Converter</h3>

  <textarea id="embedInput" placeholder="Paste embed code here..."></textarea>

  <button class="primary" onclick="convertEmbed()">Convert</button>

  <textarea id="outputHTML" placeholder="Output HTML will appear here..."></textarea>

  <button class="secondary" onclick="copyOutput()">Copy</button>
</div>

  <h1>🛠 Tools</h1>
  <p>SaaS features will live here</p>

  <div class="tool">
    <h3>Text Tool</h3>
    <input id="input" placeholder="Type something">
    <button onclick="run()">Run</button>
    <p id="output"></p>
  </div>

  <script>
    function run() {
      const val = document.getElementById("input").value;
      document.getElementById("output").innerText =
        "Processed: " + val.toUpperCase();
    }
    
    function convertEmbed() {
  const embed = document.getElementById("embedInput").value;

  const html = `
<!DOCTYPE html>
<html>
<head>
  <title>Game</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div>
    ${embed}
  </div>
</body>
</html>
`;

  document.getElementById("outputHTML").value = html;
}

function copyOutput() {
  const out = document.getElementById("outputHTML");
  out.select();
  document.execCommand("copy");
  alert("Copied!");
}

  </script>

  <br>
  <a href="/">⬅ Back Home</a>

</body>
</html>
