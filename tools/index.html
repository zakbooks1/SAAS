<!DOCTYPE html>
<html>
<head>
  <title>Tools</title>

  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
:root{
  --bg:#0a0f1c;
  --side:#0f172a;
  --card:#111827;
  --border:#1f2937;
  --accent:#3b82f6;
  --text:#e5e7eb;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:var(--side);
  height:100vh;
  padding:20px;
  border-right:1px solid var(--border);
}

.navbtn{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:transparent;
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.navbtn:hover{
  background:var(--card);
  border-color:var(--accent);
  transform:translateX(6px);
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
}

/* TOOL CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:var(--accent);
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#box{
  width:90%;
  height:90%;
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:20px;
  overflow:auto;
}

.close{
  position:absolute;
  top:15px;
  right:20px;
  background:#3b82f6;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>🛠 Tools</h3>

  <button class="navbtn" onclick="location.href='/'">🏠 Home</button>
  <button class="navbtn" onclick="location.href='/games/index.html'">🎮 Games</button>
  <button class="navbtn" onclick="location.href='/marketplace/index.html'">🛒 Marketplace</button>
  <button class="navbtn" onclick="location.href='/ai.html'">🧠 AI Generator</button>
</div>

<!-- MAIN -->
<div class="main">
  <h1>🛠 Tools</h1>

  <div class="grid">

    <div class="card" onclick="openTool('embed')">
      🔗 Embed Game Converter
    </div>

    <div class="card" onclick="openTool('html')">
      🧾 HTML Runner
    </div>

    <div class="card" onclick="openTool('notes')">
      📝 Notes Tool
    </div>

  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div id="box"></div>
</div>

<button class="close" onclick="closeTool()">✖</button>

<script>
function openTool(type){
  document.getElementById("modal").style.display="flex";

  if(type==="embed"){
    document.getElementById("box").innerHTML=`
      <h2>Embed Tool</h2>
      <textarea id="embedInput" style="width:100%;height:120px;background:#111827;color:white;border:1px solid #1f2937"></textarea>
      <button onclick="runEmbed()">Run</button>
      <div id="out"></div>
    `;
  }

  if(type==="html"){
    document.getElementById("box").innerHTML=`
      <h2>HTML Runner</h2>
      <textarea id="htmlInput" style="width:100%;height:120px;background:#111827;color:white;border:1px solid #1f2937"></textarea>
      <button onclick="runHTML()">Run</button>
      <iframe id="frame" style="width:100%;height:60vh;border:none;margin-top:10px"></iframe>
    `;
  }

  if(type==="notes"){
    document.getElementById("box").innerHTML=`
      <h2>Notes</h2>
      <textarea style="width:100%;height:60vh;background:#111827;color:white;border:1px solid #1f2937"></textarea>
    `;
  }
}

function runHTML(){
  const code=document.getElementById("htmlInput").value;
  document.getElementById("frame").srcdoc=code;
}

function runEmbed(){
  const code=document.getElementById("embedInput").value;
  document.getElementById("out").innerHTML=code;
}

function closeTool(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
