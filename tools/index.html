<!DOCTYPE html>
<html>
<head>
  <style>
    body { background:#0b0b0f; color:white; font-family:system-ui; padding:20px; }
    textarea { width:100%; height:120px; margin-top:10px; }
  </style>
</head>

<body>

<button onclick="location.href='/'">🏠 Home</button>

<h2>Embed → HTML</h2>

<textarea id="embed"></textarea>
<button onclick="convert()">Convert</button>

<textarea id="out"></textarea>

<script>
function convert() {
  const e = document.getElementById("embed").value;

  const html = `<!DOCTYPE html>
<html>
<body style="margin:0;background:black;">
${e}
</body>
</html>`;

  document.getElementById("out").value = html;
}
</script>

</body>
</html>
